<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataClean Pro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">

        <h1>DataClean Pro</h1>
        <p>Upload a CSV or Excel file to preview your dataset.</p>

        <form method="POST" enctype="multipart/form-data">

            <input
                type="file"
                name="dataset"
                accept=".csv,.xlsx"
                required
            >

            <button type="submit">
                Upload Dataset
            </button>

        </form>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        {% if preview_data %}

            <div class="summary">
                <h2>Dataset Summary</h2>

                <p><strong>Total Rows:</strong> {{ total_rows }}</p>
                <p><strong>Total Columns:</strong> {{ total_columns }}</p>
            </div>

            <div class="preview">
                <h2>First 10 Rows</h2>

                {{ preview_data | safe }}
            </div>

        {% endif %}

    </div>

</body>
</html>
